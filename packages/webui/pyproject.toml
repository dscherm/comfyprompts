[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "comfyui-webui"
version = "0.1.0"
description = "Local web UI for the ComfyUI toolchain: generate from parametric workflows, author new ones"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "flask>=3.0.0",
    "requests>=2.31.0",
    "comfyui-agent-sdk>=0.1.0",
    "comfyui-mcp-server>=1.0.0",
]

[project.scripts]
comfyui-webui = "comfyui_webui.app:main"

[tool.hatch.build.targets.wheel]
packages = ["src/comfyui_webui"]
